name: ci

# Standalone CI for an extracted Cinatra extension repo.
#
# This is the baseline gate applied to EVERY extracted extension. Kind-specific
# gates are appended to the `kind-gates` job per the extension's `cinatra.kind`:
#   - workflow  -> workflow-bpmn-gate (validates the bundled BPMN)
#   - agent     -> OAS validate (validates the agent's OpenAPI surface)
# The extraction script appends those steps when it materializes the repo; the
# placeholder step below documents the contract for kinds with no extra gate.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        # Extracted repos ship NO committed lockfile. pnpm forces
        # `frozen-lockfile` whenever the `CI` env var is set, which overrides the
        # `--no-frozen-lockfile` flag and fails with ERR_PNPM_NO_LOCKFILE. Setting
        # `npm_config_frozen_lockfile=false` is the unambiguous override that wins
        # while keeping CI=true for every other step.
        run: corepack pnpm install --no-frozen-lockfile
        env:
          npm_config_frozen_lockfile: "false"

      - name: Typecheck
        # Always run a REAL typecheck. `pnpm run --if-present` exits 0 when the
        # script is absent, so branching on its exit code would silently skip
        # typechecking for every repo without a `typecheck` script. Branch on
        # whether the script actually exists instead, and fall back to a direct
        # `tsc --noEmit` (the standalone tsconfig is shipped with the repo).
        run: |
          # Always run exactly ONE real typecheck. Branch on what the repo
          # declares (not on a command's exit code, which `pnpm run --if-present`
          # makes 0 even when the script is absent):
          #   - has a `typecheck` script        -> run it
          #   - else depends on `typescript`    -> local `tsc --noEmit`
          #   - else                            -> ephemeral `tsc` via dlx
          # The repo always ships a standalone tsconfig.json, so tsc has config.
          if node -e "process.exit(((require('./package.json').scripts)||{}).typecheck?0:1)"; then
            corepack pnpm run typecheck
          elif node -e "p=require('./package.json');d={...p.dependencies,...p.devDependencies};process.exit(d.typescript?0:1)"; then
            corepack pnpm exec tsc --noEmit
          else
            corepack pnpm dlx -p typescript tsc --noEmit
          fi

      - name: Test
        run: corepack pnpm test --if-present

      - name: Pack (dry run)
        run: npm pack --dry-run

  kind-gates:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      # NOTE: kind-specific gates are appended here by the extraction script:
      #   workflow kind -> workflow-bpmn-gate
      #   agent kind    -> OAS validate
      # Other kinds (connector, artifact, skill) have no extra gate today.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Enable corepack
        run: corepack enable
      - name: Workflow BPMN profile gate
        # Validate this repo's cinatra/workflow.bpmn against the Cinatra BPMN
        # Profile. Uses the published gate from @cinatra-ai/sdk-extensions.
        run: corepack pnpm dlx @cinatra-ai/extension-tools workflow-bpmn-gate --package-root .
